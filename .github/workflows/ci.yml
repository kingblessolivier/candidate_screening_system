name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend type-check & build ─────────────────────────────────────────────
  backend:
    name: Backend — Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & compile
        run: npm run build

  # ─── Frontend type-check & build ────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
          AUTH_SECRET: ci_placeholder_secret_not_used_in_production
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          GITHUB_CLIENT_ID: placeholder
          GITHUB_CLIENT_SECRET: placeholder
          DISCORD_CLIENT_ID: placeholder
          DISCORD_CLIENT_SECRET: placeholder
